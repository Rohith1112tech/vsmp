# ============================================================
# Docker Compose — School Management Platform
# ============================================================
# Services:
#   - db:     PostgreSQL 16 database
#   - server: Express API (port 5000)
#   - client: Next.js frontend (port 3000)
# ============================================================

services:
  # ── PostgreSQL Database ──────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: smp-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: smp_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smp_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Express API Server ───────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: smp-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/smp_db?schema=public
      JWT_SECRET: ${JWT_SECRET:-smp-jwt-secret-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-smp-jwt-refresh-secret-change-in-production}
      PORT: 5000
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

  # ── Next.js Frontend ─────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000/api
    container_name: smp-client
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - server

volumes:
  pgdata:
    driver: local
