# ============================================================
# GitHub Actions CI/CD — School Management Platform
# ============================================================
# Triggers on push to main branch and pull requests.
# Runs:
#   1. Server: npm install → prisma generate → syntax check
#   2. Client: npm install → build
# ============================================================

name: SMP CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  # ── Server Build & Validate ────────────────────────────────
  server:
    name: Server — Build & Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Validate Prisma Schema
        run: npx prisma validate

      - name: Syntax check — Server entry
        run: node --check src/index.js

      - name: Syntax check — Route files
        run: |
          node --check src/routes/auth.routes.js
          node --check src/routes/admin.routes.js
          node --check src/routes/teacher.routes.js
          node --check src/routes/parent.routes.js

      - name: Syntax check — Middleware
        run: |
          node --check src/middleware/auth.middleware.js
          node --check src/middleware/rbac.middleware.js

      - name: Syntax check — Utilities
        run: |
          node --check src/utils/jwt.js
          node --check src/utils/otp.js

  # ── Client Build ───────────────────────────────────────────
  client:
    name: Client — Build & Compile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000/api

  # ── Docker Build (optional, only on push to main) ──────────
  docker:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [server, client]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Server Docker image
        run: docker build -t smp-server:latest ./server

      - name: Build Client Docker image
        run: docker build -t smp-client:latest ./client
        env:
          DOCKER_BUILDKIT: 1

      - name: Verify images
        run: |
          docker images | grep smp
          echo "✅ Docker images built successfully"
